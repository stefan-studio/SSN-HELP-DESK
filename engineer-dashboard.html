<!DOCTYPE html>
<html>
<head>
    <title>Engineer Dashboard - SSN HelpDesk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f8fe; padding: 20px; }
        .ticket-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #0063B1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Engineer Task List</h2>
            <button class="btn btn-danger" onclick="location.href='/logout'">Logout</button>
        </div>
        
        <div id="task-container">
            <p>Loading your assigned tasks...</p>
        </div>
    </div>

    <script>
        const engId = sessionStorage.getItem('user_id');

        async function loadTasks() {
            const res = await fetch(`/api/engineer/tickets/${engId}`);
            const data = await res.json();
            const container = document.getElementById('task-container');
            
            if (data.success && data.tickets.length > 0) {
                container.innerHTML = data.tickets.map(t => `
                    <div class="ticket-card shadow-sm">
                        <div class="d-flex justify-content-between">
                            <h5>#${t.id} - ${t.issue_type}</h5>
                            <span class="badge bg-primary">${t.status}</span>
                        </div>
                        <p class="text-muted">${t.description}</p>
                        <div class="mt-2">
                            <button class="btn btn-sm btn-success" onclick="updateStatus(${t.id}, 'Resolved')">Mark Resolved</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="updateStatus(${t.id}, 'In Progress')">Start Work</button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="alert alert-info">No tasks assigned to you yet!</div>';
            }
        }

        async function updateStatus(tid, status) {
            try {
                const res = await fetch('/api/update_ticket_status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticket_id: tid, status: status })
                });
                const data = await res.json();
                if (data.success) {
                    alert(`Ticket #${tid} marked as ${status}`);
                    loadTasks();
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                console.error("Update failed:", err);
                alert("Network error updating ticket.");
            }
        }

        loadTasks();
    </script>
</body>
</html>
