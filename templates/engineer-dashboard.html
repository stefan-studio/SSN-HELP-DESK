<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Engineer Portal — HelpDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    :root { --navy:#0d2148; --blue:#1e4db7; --light-bg:#f4f6fb; }
    body { font-family: sans-serif; background: var(--light-bg); }
    .sidebar { width:250px; min-height:100vh; background:var(--navy); color:#fff; position:fixed; padding:1.5rem; }
    .main { margin-left: 250px; padding: 2rem; }
    .card-custom { background:#fff; border-radius:12px; border:1px solid #dee2e6; padding:1.5rem; }
    .badge-assigned { background: #cfe2ff; color: #0a3b80; }
  </style>
</head>
<body>

<aside class="sidebar">
  <h4>HelpDesk</h4>
  <hr>
  <p><i class="bi bi-person-circle"></i> <span id="eng-name">Engineer</span></p>
  <nav class="nav flex-column mt-4">
    <a class="nav-link text-white active" href="#"><i class="bi bi-tools"></i> My Tasks</a>
    <a class="nav-link text-white mt-5" href="#" onclick="doLogout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
  </nav>
</aside>

<main class="main">
  <h3>Engineer Command Center</h3>
  <p class="text-muted">Tickets assigned specifically to you.</p>

  <div class="card-custom mt-4">
    <h5>Assigned Tickets</h5>
    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Description</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="ticket-list">
          <tr><td colspan="5" class="text-center">Loading your tasks...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
  if (sessionStorage.getItem('role') !== 'engineer') window.location.href = '/';
  document.getElementById('eng-name').textContent = sessionStorage.getItem('full_name');
  const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

  async function loadTasks() {
    const res = await fetch('/api/tickets');
    const data = await res.json();
    if (data.success) {
      const myId = parseInt(sessionStorage.getItem('user_id'));
      const tasks = data.tickets.filter(t => t.engineer_id === myId);
      
      const imgLink = (t) => t.image_path && t.image_path !== 'null'
        ? `<div class="mt-1"><a href="/${t.image_path}" target="_blank" class="text-decoration-none small"><i class="bi bi-image"></i> View Attachment</a></div>`
        : '';

      const tbody = document.getElementById('ticket-list');
      if (tasks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">No tasks assigned to you.</td></tr>';
        return;
      }

      tbody.innerHTML = tasks.map(t => `
        <tr>
          <td>#${t.id}</td>
          <td>${t.issue_type}</td>
          <td>${t.description}${imgLink(t)}</td>
          <td><span class="badge badge-assigned">${t.status}</span></td>
          <td>
            <button class="btn btn-sm btn-success" onclick="closeTicket(${t.id})">Resolve</button>
          </td>
        </tr>
      `).join('');
    }
  }

  async function closeTicket(id) {
    const res = await fetch('/api/close_ticket', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': csrfToken
      },
      body: JSON.stringify({ ticket_id: id })
    });
    const data = await res.json();
    if (data.success) {
      alert('Ticket marked as resolved.');
      loadTasks();
    }
  }

  function doLogout() {
    sessionStorage.clear();
    fetch('/api/logout', { 
      method: 'POST',
      headers: {
        'X-CSRFToken': csrfToken
      }
    }).finally(() => { window.location.href = '/'; });
  }

  loadTasks();
</script>
</body>
</html>
